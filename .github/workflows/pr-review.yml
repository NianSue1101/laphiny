name: PR Review by Laper

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Diff 上限：约 480KB ≈ 120k token，覆盖大多数现代对话模型上下文窗口。
# 默认按行截断，避免把多字节 UTF-8（含中文、emoji）切成乱码。
env:
  DIFF_MAX_BYTES: "491520"

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Get PR diff and metadata
        id: pr
        run: |
          set -euo pipefail
          pr_number='${{ github.event.pull_request.number }}'

          gh pr view "$pr_number" --json title --jq '.title' > /tmp/pr-title.md
          gh pr view "$pr_number" --json body --jq '.body // "(no description)"' > /tmp/pr-body.md

          # 变更文件清单 + 行数统计（即使 diff 被截断，也保证 Laper 看到完整文件列表）
          gh pr view "$pr_number" --json files --jq '
            .files
            | sort_by(.path)
            | map("| `" + .path + "` | +" + (.additions|tostring) + " / -" + (.deletions|tostring) + " |")
            | ["| 文件 | +/- |", "| --- | --- |"] + .
            | join("\n")
          ' > /tmp/pr-files.md

          # 收集完整 diff，超时放宽到 90 秒（大 PR 收集慢）
          if ! timeout 90s gh pr diff "$pr_number" > /tmp/pr.diff; then
            {
              echo "> ⚠️ PR diff collection timed out after 90s; 仅使用变更文件清单代替。"
              echo ""
              gh pr view "$pr_number" --json files --jq '.files[].path'
            } > /tmp/pr.diff
          fi

          total_lines=$(wc -l < /tmp/pr.diff)
          total_bytes=$(wc -c < /tmp/pr.diff)

          # 按行截断：完整保留多字节字符，避免乱码
          : > /tmp/pr.diff.truncated
          kept_bytes=0
          kept_lines=0
          while IFS= read -r line; do
            line_bytes=$(printf '%s\n' "$line" | wc -c)
            if [ $((kept_bytes + line_bytes)) -gt "$DIFF_MAX_BYTES" ]; then
              break
            fi
            printf '%s\n' "$line" >> /tmp/pr.diff.truncated
            kept_bytes=$((kept_bytes + line_bytes))
            kept_lines=$((kept_lines + 1))
          done < /tmp/pr.diff

          if [ "$kept_lines" -lt "$total_lines" ]; then
            truncated=1
          else
            truncated=0
          fi
          pct=$(awk -v k="$kept_bytes" -v t="$total_bytes" 'BEGIN { if (t==0) print "100.0"; else printf "%.1f", k*100/t }')

          echo "diff_total_lines=$total_lines" >> "$GITHUB_OUTPUT"
          echo "diff_total_bytes=$total_bytes" >> "$GITHUB_OUTPUT"
          echo "diff_kept_lines=$kept_lines" >> "$GITHUB_OUTPUT"
          echo "diff_kept_bytes=$kept_bytes" >> "$GITHUB_OUTPUT"
          echo "diff_truncated=$truncated" >> "$GITHUB_OUTPUT"
          echo "diff_kept_pct=$pct" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Request Laper review
        id: laper
        run: |
          set -euo pipefail

          # 构造 diff 完整性说明，明确告诉 Laper 她能看到多少、看不到多少
          if [ "${{ steps.pr.outputs.diff_truncated }}" = "1" ]; then
            TRUNCATION_NOTE=$(printf '\n## ⚠️ Diff 截断说明\n本次 PR diff 共 %s 行 / %s 字节，已按行截断保留前 %s 行 / %s 字节（保留 %s%%）。\n剩余部分未发送给你，完整 diff 已作为 workflow artifact 上传（名称：pr-context）。\n**重要**：请在结论中明确区分「基于可见 diff 的审查结论」与「因截断无法验证的部分」。对于文件清单中出现、但代码变更段落未出现其内容的文件，请直接说明"该文件 diff 被截断，无法验证"，不要臆测其内容。\n' \
              "${{ steps.pr.outputs.diff_total_lines }}" \
              "${{ steps.pr.outputs.diff_total_bytes }}" \
              "${{ steps.pr.outputs.diff_kept_lines }}" \
              "${{ steps.pr.outputs.diff_kept_bytes }}" \
              "${{ steps.pr.outputs.diff_kept_pct }}")
          else
            TRUNCATION_NOTE=$(printf '\n## Diff 完整性\n本次 PR diff 共 %s 行 / %s 字节，已完整发送，未截断。\n' \
              "${{ steps.pr.outputs.diff_total_lines }}" \
              "${{ steps.pr.outputs.diff_total_bytes }}")
          fi

          cat > /tmp/review-instructions.md <<'PROMPT'
          你是 Laper，Laphiny 项目的代码审查 Agent。请审查以下 PR。

          ## 项目背景
          Laphiny 是一个面向多 Hermes Agent 的本地优先协作聊天客户端。核心理念是 Soul-native 而非 Prompt-native：
          每个 Agent 保留自己的 soul、人格和记忆，Laphiny 提供房间、共享上下文、@ 委托、协作仪式和房间记忆。

          项目目标：
          - 多 Agent 在同一个房间内协作，互相委托、接力讨论
          - Agent 自维护公开协作卡片，不泄露私密 soul
          - 支持 /council、/redteam、/review、/retro 等协作仪式
          - 房间记忆胶囊、任务看板、RP 桌游店模式
          - Web/PWA + Android APK 双平台

          ## 审查要求
          请从以下角度审查这个 PR，用中文输出：

          1. **与项目目标的一致性**：这个 PR 是否在推进项目核心目标？有没有偏离方向？
          2. **代码质量**：TypeScript 类型是否完整？错误处理是否到位？有没有明显 bug？
          3. **架构影响**：修改是否放在正确的模块（lib/ vs app/ vs components/）？有没有让 App.tsx 更肿？
          4. **安全性**：是否可能泄露 API Key、session 信息或个人数据？
          5. **测试覆盖**：新增逻辑是否有对应测试？有没有测试防护薄弱的地方？
          6. **总体评价**：✅ 建议合并 / ⚠️ 修改后合并 / ❌ 不建议合并，并说明理由。

          格式要求：
          - 使用 Markdown
          - 每条意见前用 emoji（🐛 bug / 💡 建议 / ⚠️ 风险 / ✅ 好的做法）
          - 最后给出明确结论

          ## 关键规则
          - 「变更文件清单」段落包含 PR 触及的所有文件（即使 diff 被截断）。请先用清单核对 PR 描述中声称的改动是否对得上。
          - 若某文件在清单中但「代码变更」段落里完全没出现，说明它的 diff 被截断，请明确写"该文件 diff 被截断，无法验证"，不要臆测其内容。
          - 不要因为"可能被截断"就模糊结论：可见 diff 的部分要给出确切判断，不可见的部分单独列出。
          PROMPT

          PROMPT_TEXT=$(jq -n -r \
            --rawfile instructions /tmp/review-instructions.md \
            --rawfile title /tmp/pr-title.md \
            --rawfile body /tmp/pr-body.md \
            --rawfile files /tmp/pr-files.md \
            --arg truncation "$TRUNCATION_NOTE" \
            --rawfile diff /tmp/pr.diff.truncated \
            '$instructions
              + "\n## PR 标题\n" + $title
              + "\n## PR 描述\n" + $body
              + $truncation
              + "\n## 变更文件清单\n" + $files
              + "\n## 代码变更\n```diff\n" + $diff + "\n```"')

          jq -n \
            --arg model "hermes-agent" \
            --arg prompt "$PROMPT_TEXT" \
            '{
              model: $model,
              messages: [
                {role: "system", content: "你是 Laper，Laphiny 项目的专业代码审查 Agent。用中文给出建设性的、具体的审查意见。"},
                {role: "user", content: $prompt}
              ],
              stream: false
            }' > /tmp/laper-request.json

          set +e
          curl -s -X POST "${{ secrets.LAPER_BASE_URL }}/v1/chat/completions" \
            -H "Authorization: Bearer ${{ secrets.LAPER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Hermes-Session-Key: laphiny-pr-review" \
            --data-binary @/tmp/laper-request.json \
            --connect-timeout 20 \
            --max-time 450 \
            --retry 2 \
            --retry-delay 8 \
            --retry-max-time 90 \
            -o /tmp/laper-response.json
          curl_status=$?
          set -e

          if [ "$curl_status" -ne 0 ]; then
            REVIEW=$(printf 'Laper 无法完成审查：请求失败或超时（curl exit %s）。\n\n- diff 总计：%s 行 / %s 字节\n- 已发送：%s 行 / %s 字节（%s%%）\n- 完整 diff、PR 上下文与响应体已作为 artifact 上传（pr-context）\n\n请检查平板 Hermes 是否在前台、网络是否稳定，以及服务端是否允许 450 秒请求。' \
              "$curl_status" \
              "${{ steps.pr.outputs.diff_total_lines }}" \
              "${{ steps.pr.outputs.diff_total_bytes }}" \
              "${{ steps.pr.outputs.diff_kept_lines }}" \
              "${{ steps.pr.outputs.diff_kept_bytes }}" \
              "${{ steps.pr.outputs.diff_kept_pct }}")
          elif jq -e . >/dev/null 2>&1 < /tmp/laper-response.json; then
            REVIEW=$(jq -r '.choices[0].message.content // "Laper 无法完成审查：" + (.error.message // "unknown error")' < /tmp/laper-response.json)
          else
            # 保留响应体前 1500 字符便于排查（避免再次出现"响应不是 JSON"无法定位的问题）
            RESP_HEAD=$(head -c 1500 /tmp/laper-response.json | tr -d '\000' | sed 's/`/\\`/g' | sed 's/$/\\n/' | tr -d '\n')
            REVIEW=$(printf 'Laper 无法完成审查：响应不是 JSON。\n\n响应前 1500 字符（完整响应体见 artifact pr-context/laper-response.json）：\n```\n%s\n```\n\n- diff 总计：%s 行 / %s 字节\n- 完整上下文见 artifact：pr-context' \
              "$RESP_HEAD" \
              "${{ steps.pr.outputs.diff_total_lines }}" \
              "${{ steps.pr.outputs.diff_total_bytes }}")
          fi

          REVIEW_EVENT="COMMENT"
          if grep -q "❌ 不建议合并" <<< "$REVIEW"; then
            REVIEW_EVENT="REQUEST_CHANGES"
          elif grep -q "✅ 建议合并" <<< "$REVIEW"; then
            REVIEW_EVENT="APPROVE"
          fi

          # 在 review 头部明示 diff 规模，方便读者判断 Laper 是否"看不到全文"
          {
            echo "### Laper 自动审查"
            echo
            echo "> 📋 **Diff 规模**：${{ steps.pr.outputs.diff_total_lines }} 行 / ${{ steps.pr.outputs.diff_total_bytes }} 字节 | 已发送 ${{ steps.pr.outputs.diff_kept_lines }} 行 / ${{ steps.pr.outputs.diff_kept_bytes }} 字节（${{ steps.pr.outputs.diff_kept_pct }}%） | 完整上下文见 workflow artifact \`pr-context\`"
            echo
            echo "$REVIEW"
          } > /tmp/laper-review.md
          echo "review_file=/tmp/laper-review.md" >> "$GITHUB_OUTPUT"
          echo "review_event=$REVIEW_EVENT" >> "$GITHUB_OUTPUT"

      - name: Post Laper review
        run: |
          set -euo pipefail
          pr_number='${{ github.event.pull_request.number }}'
          review_file='${{ steps.laper.outputs.review_file }}'
          review_event='${{ steps.laper.outputs.review_event }}'

          case "$review_event" in
            APPROVE)
              gh pr review "$pr_number" --approve --body-file "$review_file" \
                || gh pr comment "$pr_number" --body-file "$review_file"
              ;;
            REQUEST_CHANGES)
              gh pr review "$pr_number" --request-changes --body-file "$review_file" \
                || gh pr comment "$pr_number" --body-file "$review_file"
              ;;
            *)
              gh pr review "$pr_number" --comment --body-file "$review_file" \
                || gh pr comment "$pr_number" --body-file "$review_file"
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PR context artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-context
          path: |
            /tmp/pr.diff
            /tmp/pr.diff.truncated
            /tmp/pr-title.md
            /tmp/pr-body.md
            /tmp/pr-files.md
            /tmp/laper-request.json
            /tmp/laper-response.json
            /tmp/laper-review.md
          retention-days: 14
          if-no-files-found: ignore
