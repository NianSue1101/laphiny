<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Laphiny 离线</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f8efe4; color: #111827; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: min(560px, calc(100vw - 40px)); padding: 28px; border: 1px solid #e5e7eb; border-radius: 16px; background: #fff; box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08); }
      h1 { margin: 0 0 10px; font-size: 24px; }
      p { margin: 8px 0; line-height: 1.7; color: #4b5563; }
      button { margin-top: 14px; border: 0; border-radius: 999px; padding: 10px 16px; background: #2563eb; color: white; font-weight: 800; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>Laphiny 当前离线</h1>
      <p>本地聊天记录仍保存在设备上。网络恢复后，请重新打开或刷新页面继续使用 Hermes 请求和同步。</p>
      <button onclick="location.reload()">重试连接</button>
    </main>
  </body>
</html>
